id: voice_independence
name: Voice Independence
family: counterpoint
type: primitive
domain: counterpoint
category: counterpoint
version: 0.1.0
status: experimental
purpose: Two or more voices behave as independent melodic entities rather than accompaniment.
summary: Two or more voices behave as independent melodic entities rather than accompaniment.
inputs:
  required:
    - voices
    - context
  optional:
    - register_constraint
parameters: {}
outputs:
  type: contrapuntal_material
  guarantees:
    - Each voice forms a coherent melodic line
    - Voices maintain melodic logic when crossing
rules:
  - Each voice must form a coherent melodic line
  - Avoid identical rhythmic profiles between voices
  - Voices may cross but must maintain melodic logic
  - Harmonic meaning emerges from line interaction
evaluation:
  success_conditions:
    - Voices are melodically independent
    - No identical rhythmic profiles
  failure_conditions:
    - One voice purely accompanimental
    - Rhythmic lockstep between voices
dependencies: []
tags: [counterpoint, voice leading, Bach, Wyble]
