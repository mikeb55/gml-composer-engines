id: ellington_orchestration_engine
name: Ellington Orchestration Engine
category: composer
version: 0.2.0
status: experimental
purpose: Determine orchestration behaviour across big-band sections from harmonic input.
musical_scope:
  domains: [orchestration, voicing, section writing, big band]
  typical_contexts: [big band, jazz arranging, section backgrounds, Ellington-style]
inputs:
  required:
    - harmonic_context
    - melodic_material
  optional:
    - ensemble_spec
    - density_target
    - phrase_length
primitives:
  required:
    - section_role_assignment
    - brass_reed_contrast
    - background_figure
    - density_orchestration_map
    - register_layer
    - section_call_response
    - voicing_spread
  optional: []
parameters:
  register_preference: clear_separation
  dialogue_bias: 0.6
  voicing_spread_default: open
  density_build_bias: 0.7
  background_density_limit: 4
sections:
  - sax_section
  - trumpet_section
  - trombone_section
  - rhythm_section
style_constraints:
  - Clear register separation (melody high, backgrounds mid, bass low).
  - Brass and reeds alternate for dialogue when appropriate.
  - Voicings open for clarity; closed for density.
  - Background figures never override lead material.
  - Section roles never conflict.
  - Density map evolves logically (build, release).
  - Brass/reed contrast preserved.
decision_logic:
  roles: "Apply section_role_assignment; assign lead, pad, background, punctuation, support."
  contrast: "Apply brass_reed_contrast; colour, weight, response."
  background: "Apply background_figure; ostinato, pad, hits; density_limit."
  density: "Apply density_orchestration_map; sparse → medium → dense → tutti."
  register: "Apply register_layer; melody to high, backgrounds to mid."
  dialogue: "Apply section_call_response when density allows; brass vs. reeds."
  voicing: "Apply voicing_spread; open for tutti, closed for section punches."
behaviour:
  determines:
    - which section leads
    - which section answers
    - when background figures appear
    - when density increases
    - when tutti occurs
outputs:
  type: orchestration
  produces: [register_assignment, section_timeline, voicings, role_map, density_map, contrast_spec]
evaluation:
  success_conditions:
    - Register layers are clear.
    - Section dialogue present when density allows.
    - Voicings are playable and clear.
    - Section roles never conflict.
    - Density map evolves logically.
    - Background figures do not override lead.
    - Brass/reed contrast preserved.
  failure_conditions:
    - Register clash (melody and background in same band).
    - Impossible tessitura for instruments.
    - Unplayable voicings.
    - Role conflict (two leads).
    - Background figures competing with lead.
  test_prompts:
    - "Orchestrate 8-bar melody for big band; brass-reed dialogue."
    - "Assign backgrounds to register layers; open voicings."
    - "Dm7→G7→Cmaj7: section roles across 8 bars."
dependencies:
  knowledge_sources: [gml-codex]
  related_engines: []
tags: [Ellington, orchestration, big band, arranging, sectional]
