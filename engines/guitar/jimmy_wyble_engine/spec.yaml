id: jimmy_wyble_engine
name: Jimmy Wyble Engine
category: composer-engine
version: 0.1.0
status: experimental
purpose: Generate two-voice contrapuntal guitar material in the spirit of Jimmy Wyble's two-line improvisation method, prioritising voice independence, implied harmony, contrary/oblique motion, and playable linear texture.
musical_scope:
  domains: [solo guitar, two-line improvisation, contrapuntal etude, harmonic implication]
  typical_contexts: [solo guitar etudes, EP repertoire reduction, polyphonic guitar writing]
inputs:
  required:
    - harmonic_context
    - register_plan
  optional:
    - motif_seed
    - phrase_length
    - density_profile
    - guitar_range
    - rhythmic_profile
primitives:
  required:
    - voice_independence
    - contrary_motion
    - oblique_motion
    - parallel_avoidance
    - register_partition
    - playability_constraint
    - dyad_density_control
    - string_set_preference
  optional:
    - suspension_chain
    - transform_fragment
    - transform_transposition
    - pedal_tone_anchor
    - voice_ratio_control
    - chord_stack_extraction
parameters:
  independence_bias: 0.8
  contrary_motion_bias: 0.7
  dyad_density: 0.6
  chromaticism_level: 0.2
  register_overlap_tolerance: 0.4
  guitar_position_span: 5
  voice_ratio_mode: mixed
  altered_dominant_bias: 0.0
  staggered_attack_feel: false
  practice_mode: etude
  pedal_tone_enabled: false
generation_pipeline:
  1_motif_or_harmonic_seed: "Establish harmonic context or motif seed. If harmonic_context provided, derive scale/chord tones. chord_stack_extraction: extract 2-note teams from 4-note chords (5-root-3-7, root-5-7-3, root-7-3-5, root-7-9-11, root-3-7-9). altered_dominant_bias adds b9, #9, b5, #5, diminished-derived motion over dominants."
  2_register_partition_assignment: "Apply register_partition. Assign upper voice to E4–C6, lower to E2–B3. Allow momentary crossing within register_overlap_tolerance."
  3_counterpoint_motion_generation: "Generate two lines using voice_independence, contrary_motion, oblique_motion, parallel_avoidance. Apply contrary_motion_bias and independence_bias. Avoid parallel fifths/octaves."
  4_dyad_density_management: "Apply dyad_density_control. Alternate line → dyad → line → dyad. Emphasise dyads at structural moments (cadences, phrase ends). Use dyad_density parameter. voice_ratio_mode (1:1, 2:1, 3:1, mixed) controls note-density ratio between voices."
  5_guitar_playability_validation: "Apply playability_constraint and string_set_preference. Ensure intervals within guitar_position_span. Favour adjacent strings. Flag or correct impossible stretches."
  6_implied_harmonic_profile_inference: "Infer implied harmony from dyadic events. Output harmonic_profile: chord roots and qualities implied by line interaction. No full block voicing."

parameter_descriptions:
  independence_bias: "Strength of voice_independence preference. 0 = allow accompaniment-like lower; 1 = both voices must be fully melodic."
  contrary_motion_bias: "Strength of contrary_motion preference. 0 = parallel allowed; 1 = strongly favour contrary/oblique."
  dyad_density: "Target frequency of simultaneous sounds. 0 = mostly single-line; 1 = frequent dyads. Feeds dyad_density_control."
  chromaticism_level: "Amount of chromatic passing/neighbour tones. 0 = diatonic; 1 = liberal chromaticism."
  register_overlap_tolerance: "Amount of register overlap allowed between voices. 0 = strict separation; 1 = crossing allowed freely."
  guitar_position_span: "Max fret span for one hand position (semitones). Default 5. Feeds playability_constraint."
  voice_ratio_mode: "Note ratio between voices: one_to_one, two_to_one, three_to_one, mixed. Wyble uses 1:1, 2:1, 3:1 explicitly."
  altered_dominant_bias: "0.0–1.0. Favour b9, #9, b5, #5, diminished-derived motion over dominants. Half-whole/whole-half logic."
  staggered_attack_feel: "Slight bass-before-upper staggering. Affects articulation metadata; does not break MusicXML."
  practice_mode: "etude = musical phrasing; exercise = systematic patterning; improvisation = freer output."
  pedal_tone_enabled: "Fixed or repeated lower-note pedal; upper voice moves above. Wyble basic contrapuntal device."
style_constraints:
  - Two voices only by default
  - Both voices must remain melodically coherent
  - Avoid reducing one voice to static accompaniment
  - Favour contrary and oblique motion over continuous parallel motion
  - Harmony should emerge from line interaction rather than constant block voicing
  - Preserve playability for solo guitar
  - Allow momentary voice crossing when musically justified
  - Avoid generic chord-melody texture
decision_logic:
  line_generation: "Generate two independent melodic lines; apply voice_independence."
  motion_preference: "Apply contrary_motion and oblique_motion; minimise parallel via parallel_avoidance."
  harmonic_implication: "Harmony emerges from dyadic events; avoid full block voicing."
  register_behaviour: "Respect register_plan; allow crossing within crossing_tolerance."
  density_control: "Use dyad_density to balance activity; avoid static filler."
outputs:
  type: contrapuntal_guitar_material
  produces: [upper_line, lower_line, implied_harmonic_profile, dyadic_events, playable_etude_material]
evaluation:
  success_conditions:
    - Both voices sound independent
    - Harmonic movement is implied clearly enough without full vertical saturation
    - Texture remains guitar-playable
    - Motion avoids excessive parallel perfect intervals
    - Output feels like contrapuntal line writing rather than melody plus filler
  failure_conditions:
    - One voice becomes mere accompaniment
    - Too many static filler dyads
    - Implied harmony is too weak or too muddy
    - Writing is not realistically playable on guitar
test_prompts:
  - "Generate an 8-bar two-line study over a ii-V-I progression"
  - "Generate a contrapuntal etude fragment from a motif seed"
  - "Generate two-voice material with high contrary-motion bias"
dependencies:
  knowledge_sources: [gml-codex, future guitar/counterpoint notes, counterpoint primitive family]
  related_engines: [bach_counterpoint_engine, contemporary_counterpoint_engine]
tags: [Jimmy Wyble, guitar, counterpoint, two-line, etude]
